version: '3.8'

services:
  postgres:
    # Phase 9.1: pgvector-fae$higes Postgres-16-Image (binary-kompatibel zu postgres:16-alpine,
    # pgdata-Volume bleibt unveraendert). Aktiviert die `vector`-Extension fuer RAG-Phasen.
    image: pgvector/pgvector:pg16
    container_name: discord-v-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discord_v_bot}
      POSTGRES_USER: ${POSTGRES_USER:-discordbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-discordbot} -d ${POSTGRES_DB:-discord_v_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis als optionaler Response-Cache (Phase 3.2). Genutzt von
  # src/utils/responseCache.ts wenn REDIS_URL gesetzt ist. Cached deterministische
  # AI-Calls (translateText) — ~50MB RAM, persistiert via AOF.
  redis:
    image: redis:7-alpine
    container_name: discord-v-bot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build: .
    container_name: discord-v-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-discordbot}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-discord_v_bot}?schema=public
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NODE_ENV: production
      # Stabiler Host-Identifier fuer Singleton-Lock (Docker vergibt sonst pro
      # Container-Restart einen neuen Hostnamen, was die Same-Host-Erkennung
      # bricht und nach Crashes Restart-Loops verursacht).
      BOT_STABLE_HOST_ID: ${BOT_STABLE_HOST_ID:-discord-v-bot}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs

volumes:
  pgdata:
  redisdata:
  uploads:
  logs:
