version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: discord-v-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discord_v_bot}
      POSTGRES_USER: ${POSTGRES_USER:-discordbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-discordbot} -d ${POSTGRES_DB:-discord_v_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: discord-v-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-discordbot}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-discord_v_bot}?schema=public
      NODE_ENV: production
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs

volumes:
  pgdata:
  uploads:
  logs:
