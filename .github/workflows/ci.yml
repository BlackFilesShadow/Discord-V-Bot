name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  NODE_OPTIONS: '--max-old-space-size=4096'
  DOCKER_BUILDKIT: '1'
  # Aktionen, die intern noch Node 20 bundeln (z.B. upload-artifact@v5 zum
  # Zeitpunkt April 2026), zwingen wir bereits auf Node 24, um die
  # Deprecation-Warnung zu beheben.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    # Dummy-Werte fuer alle env() Referenzen im Schema bzw. config-validation.
    # `prisma validate` und `tsc` bauen NIE eine DB-Verbindung auf, brauchen
    # die Variable nur, damit das env()-Lookup nicht hart scheitert (P1012).
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            dashboard-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install dashboard-ui dependencies
        # build:ui ruft `vite build` im dashboard-ui auf — Deps muessen
        # separat installiert werden, sonst fehlt z.B. `vite/client`.
        working-directory: dashboard-ui
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: ESLint (errors blocking, warnings allowed)
        run: npx eslint "src/**/*.ts" --max-warnings=9999

      - name: TypeScript Build
        run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: discord_v_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/discord_v_bot_test
      DISCORD_TOKEN: test-token
      DISCORD_CLIENT_ID: test-client-id
      DISCORD_CLIENT_SECRET: test-secret
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      SESSION_SECRET: test-session-secret
      DASHBOARD_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            dashboard-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma db push

      - name: Run tests
        run: npm test -- --coverage --forceExit

      - name: Upload coverage
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: coverage/

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            dashboard-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical blocking)
        run: npm audit --audit-level=critical

      - name: npm audit (high - report only)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Generate SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@latest \
            --output-format JSON \
            --output-file sbom.cyclonedx.json \
            --omit dev || echo "SBOM-Generation fehlgeschlagen (non-blocking)"

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: warn

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-build, test, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker Image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t discord-v-bot:${{ github.sha }} .
          else
            echo "Kein Dockerfile vorhanden, überspringe Docker Build"
          fi
